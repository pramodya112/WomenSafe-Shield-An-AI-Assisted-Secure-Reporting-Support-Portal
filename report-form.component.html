<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-lg">
                <div class="card-header bg-dark text-white p-4">
                    <h2 class="mb-0">Secure Incident Report</h2>
                    <small>Your submission is anonymous and encrypted.</small>
                </div>

                <div class="card-body p-4">
                    <div *ngIf="successMessage" class="alert alert-success">{{ successMessage }}</div>
                    <div *ngIf="errorMessage" class="alert alert-danger">{{ errorMessage }}</div>

                    <form (ngSubmit)="submit()">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Incident Title</label>
                            <input type="text" class="form-control" [(ngModel)]="reportData.title" name="title" placeholder="e.g., Request for Legal Aid" required>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Incident Type</label>
                                <select class="form-select" [(ngModel)]="reportData.incidentType" name="type">
                                    <option value="General">General Inquiry</option>
                                    <option value="Legal Assistance">Legal Assistance</option>
                                    <option value="Emergency">Emergency Support</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Location</label>
                                <input type="text" class="form-control" [(ngModel)]="reportData.location" name="location" placeholder="City or District">
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Detailed Description</label>
                            <textarea class="form-control" [(ngModel)]="reportData.description" name="description" rows="5" placeholder="Please provide as much detail as possible..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100 mt-3">Submit Report Anonymously</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
